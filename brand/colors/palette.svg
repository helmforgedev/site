<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <!-- Primary -->
  <rect x="20" y="20" width="110" height="90" rx="12" fill="#7c3aed" />
  <text x="75" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Primary</text>
  <text x="75" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#7c3aed</text>

  <rect x="140" y="20" width="110" height="90" rx="12" fill="#a78bfa" />
  <text x="195" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Primary Light</text>
  <text x="195" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#a78bfa</text>

  <rect x="260" y="20" width="110" height="90" rx="12" fill="#5b21b6" />
  <text x="315" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Primary Dark</text>
  <text x="315" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#5b21b6</text>

  <!-- Accent -->
  <rect x="420" y="20" width="110" height="90" rx="12" fill="#ea580c" />
  <text x="475" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Accent</text>
  <text x="475" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#ea580c</text>

  <rect x="540" y="20" width="110" height="90" rx="12" fill="#f97316" />
  <text x="595" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Accent Light</text>
  <text x="595" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#f97316</text>

  <!-- Crossbar gradient -->
  <defs>
    <linearGradient id="cb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>
  <rect x="670" y="20" width="110" height="90" rx="12" fill="url(#cb)" />
  <text x="725" y="130" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Crossbar</text>
  <text x="725" y="143" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">gradient</text>

  <!-- Backgrounds -->
  <rect x="20" y="180" width="110" height="60" rx="12" fill="#070708" stroke="#212126" stroke-width="1" />
  <text x="75" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">BG Base</text>
  <text x="75" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#070708</text>

  <rect x="140" y="180" width="110" height="60" rx="12" fill="#121215" stroke="#212126" stroke-width="1" />
  <text x="195" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">BG Surface</text>
  <text x="195" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#121215</text>

  <rect x="260" y="180" width="110" height="60" rx="12" fill="#212126" stroke="#3f3f46" stroke-width="1" />
  <text x="315" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Border</text>
  <text x="315" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#212126</text>

  <!-- Text -->
  <rect x="420" y="180" width="110" height="60" rx="12" fill="#ffffff" />
  <text x="475" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Text Base</text>
  <text x="475" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#ffffff</text>

  <rect x="540" y="180" width="110" height="60" rx="12" fill="#a1a1aa" />
  <text x="595" y="260" text-anchor="middle" font-family="system-ui" font-size="10" fill="#a1a1aa">Text Muted</text>
  <text x="595" y="273" text-anchor="middle" font-family="monospace" font-size="9" fill="#71717a">#a1a1aa</text>
</svg>
